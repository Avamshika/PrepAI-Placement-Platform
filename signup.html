<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrepAI Signup</title>
  <link rel="stylesheet" href="css/signup.css" />
</head>
<body>
  <div class="form-wrapper">
    <form id="signupForm" class="auth-card">
      <h2>Create Account</h2>
      <p>Start your placement journey</p>

      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" placeholder="Your name" />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Minimum 8 characters" />

      <label for="college">College</label>
      <input type="text" id="college" name="college" placeholder="Your college" />

      <label for="year">Year</label>
      <input type="text" id="year" name="year" placeholder="2nd Year" />

      <button type="submit" class="btn primary">Sign Up</button>
      <p class="switch-text">Already have an account? <a href="login.html">Log in</a></p>
    </form>
  </div>

  <script src="js/signup.js"></script>
</body>
</html>
