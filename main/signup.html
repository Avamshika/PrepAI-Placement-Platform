<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrepAI Signup</title>
  <link rel="stylesheet" href="login/login.css" />
</head>
<body>
  <div class="login-container">
    <form class="form-card2" id="authForm">
      <h2>Create Your PrepAI Account</h2>
      <p class="subtitle">Start your personalized placement journey</p>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="name@gmail.com" required />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>

      <button type="submit" class="secondary-btn">Create Account</button>

      <p class="subtitle2">
        Already have an account?
        <a href="login/login.html">Login</a>
      </p>
    </form>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
