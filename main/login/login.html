<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepAI Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">

        <form class="form-card2" id="authForm">

            <h2>
                Your Personalized AI Placement Copilot is waiting.
            </h2>

            <p class="subtitle">
                Log in to your account
            </p>

            <div class="input-group">

                <label for="email">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="name@gmail.com"
                    required
                >

            </div>

            <div class="input-group">

                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    required
                >

            </div>

            <button type="submit" class="secondary-btn">
                Login
            </button>

            <p class="subtitle2">

                Don't have an account?

                <a href="../signup.html">
                    Signup
                </a>

            </p>

        </form>

    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
